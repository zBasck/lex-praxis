{% extends "base.html" %}
{% block title %}Agenda — Lex Praxis{% endblock %}
{% block content %}
<h3 class="mb-3">Agenda</h3>
<div class="card border-0 shadow-sm">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div class="btn-group">
        <button class="btn btn-outline-secondary btn-sm" id="prev-month"><i class="bi bi-chevron-left"></i></button>
        <button class="btn btn-outline-secondary btn-sm" id="today">Hoje</button>
        <button class="btn btn-outline-secondary btn-sm" id="next-month"><i class="bi bi-chevron-right"></i></button>
      </div>
      <h5 class="mb-0" id="mes-label"></h5>
      <a class="btn btn-outline-primary btn-sm" href="/cal.ics">Exportar .ics</a>
    </div>
    <div class="table-responsive">
      <table class="table table-bordered text-center mb-0" id="cal">
        <thead class="table-light"><tr id="cal-head"></tr></thead>
        <tbody id="cal-body"></tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>LexPravis.agenda();</script>
{% endblock %}
